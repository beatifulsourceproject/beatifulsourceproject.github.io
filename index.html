<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beatifull Source</title>
<link rel="icon" type="image/png" href="bs.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#070709;
--bg2:#0d0d12;
--bg3:#12121a;
--surface:#16161f;
--surface2:#1c1c28;
--border:#2a2a3d;
--border2:#3a3a55;
--purple:#7c3aed;
--purple2:#9d5ff0;
--purple3:#b480f7;
--purple-glow:rgba(124,58,237,0.18);
--violet:#5b21b6;
--grey:#8888a0;
--grey2:#aaaabc;
--white:#e8e8f0;
--text:#d0d0e0;
--accent:#a78bfa;
--accent2:#c4b5fd;
--green:#10b981;
--red:#ef4444;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse 80% 50% at 20% -10%,rgba(124,58,237,0.07) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 110%,rgba(91,33,182,0.06) 0%,transparent 60%);pointer-events:none;z-index:0}

header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(7,7,9,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;padding:0 24px;gap:16px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.15rem;color:var(--white);letter-spacing:-.02em;white-space:nowrap;flex-shrink:0}
.logo span{color:var(--purple3)}
.nav-links{display:flex;align-items:center;gap:4px;flex:1;overflow-x:auto;scrollbar-width:none}
.nav-links::-webkit-scrollbar{display:none}
.nav-btn{background:none;border:1px solid transparent;color:var(--grey);padding:6px 13px;border-radius:6px;cursor:pointer;font-family:'Syne',sans-serif;font-size:.78rem;font-weight:600;letter-spacing:.04em;white-space:nowrap;transition:all .2s;text-transform:uppercase}
.nav-btn:hover,.nav-btn.active{color:var(--accent2);border-color:var(--border2);background:var(--surface)}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:auto}
.lang-btns{display:flex;gap:4px}
.lang-btn{background:none;border:1px solid var(--border);color:var(--grey);padding:4px 9px;border-radius:5px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:500;transition:all .2s}
.lang-btn.active,.lang-btn:hover{border-color:var(--purple2);color:var(--purple3)}
.swiss-knife{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--border2);letter-spacing:.08em;padding:4px 8px;border:1px solid var(--border);border-radius:4px;white-space:nowrap}
.gh-btn{background:var(--surface);border:1px solid var(--border2);color:var(--grey2);padding:5px 11px;border-radius:6px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:500;text-decoration:none;display:flex;align-items:center;gap:5px;transition:all .2s}
.gh-btn:hover{border-color:var(--purple2);color:var(--white);background:var(--surface2)}
.hamburger{display:none;background:none;border:1px solid var(--border);color:var(--grey2);padding:6px 10px;border-radius:6px;cursor:pointer;font-size:1rem}

.mobile-menu{display:none;position:fixed;top:60px;right:0;bottom:0;width:260px;background:rgba(13,13,18,0.98);backdrop-filter:blur(20px);border-left:1px solid var(--border);z-index:99;padding:20px 16px;transform:translateX(100%);transition:transform .3s cubic-bezier(.16,1,.3,1)}
.mobile-menu.open{transform:translateX(0)}
.mobile-menu .nav-btn{display:block;width:100%;text-align:left;padding:10px 14px;margin-bottom:4px;border-radius:7px}

main{padding-top:60px;min-height:100vh;position:relative;z-index:1}
.page{display:none;animation:fadeUp .4s ease forwards}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

.hero{padding:80px 24px 60px;max-width:860px;margin:0 auto;text-align:center}
.hero-eyebrow{font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:.18em;color:var(--purple3);text-transform:uppercase;margin-bottom:20px;opacity:.85}
.hero-title{font-size:clamp(2.2rem,6vw,4rem);font-weight:800;line-height:1.1;letter-spacing:-.03em;color:var(--white);margin-bottom:22px}
.hero-title em{font-style:normal;color:var(--purple3);position:relative}
.hero-title em::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--purple),transparent);border-radius:2px}
.hero-sub{font-size:1rem;line-height:1.7;color:var(--grey2);max-width:600px;margin:0 auto 36px;font-family:'JetBrains Mono',monospace;font-weight:300}
.hero-tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:40px}
.hero-tag{background:var(--surface);border:1px solid var(--border);color:var(--grey2);padding:5px 14px;border-radius:20px;font-size:.75rem;font-family:'JetBrains Mono',monospace}
.hero-tag.bad{border-color:rgba(239,68,68,.3);color:#f87171;background:rgba(239,68,68,.05)}
.hero-tag.good{border-color:rgba(167,139,250,.3);color:var(--accent2);background:rgba(124,58,237,.06)}
.hero-cta{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--purple),var(--violet));color:var(--white);padding:13px 28px;border-radius:9px;text-decoration:none;font-weight:700;font-size:.9rem;letter-spacing:.03em;border:none;cursor:pointer;transition:all .25s;box-shadow:0 0 30px rgba(124,58,237,.25)}
.hero-cta:hover{transform:translateY(-2px);box-shadow:0 6px 40px rgba(124,58,237,.4)}

.threat-section{max-width:860px;margin:0 auto 60px;padding:0 24px}
.threat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
.threat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;position:relative;overflow:hidden}
.threat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.threat-card.danger::before{background:linear-gradient(90deg,var(--red),transparent)}
.threat-card.good::before{background:linear-gradient(90deg,var(--purple),transparent)}
.threat-card h3{font-size:.85rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
.threat-card.danger h3{color:#f87171}
.threat-card.good h3{color:var(--accent2)}
.threat-card p{font-size:.82rem;line-height:1.6;color:var(--grey2);font-family:'JetBrains Mono',monospace;font-weight:300}

.leave-banner{max-width:860px;margin:0 auto 60px;padding:0 24px}
.leave-card{background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(91,33,182,.08));border:1px solid rgba(124,58,237,.3);border-radius:14px;padding:32px;text-align:center;position:relative;overflow:hidden}
.leave-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(124,58,237,.06) 0%,transparent 60%);animation:rotateBg 8s linear infinite}
@keyframes rotateBg{to{transform:rotate(360deg)}}
.leave-card h2{font-size:1.3rem;font-weight:800;color:var(--white);margin-bottom:10px;position:relative}
.leave-card p{font-size:.85rem;color:var(--grey2);margin-bottom:20px;font-family:'JetBrains Mono',monospace;position:relative}
.leave-link{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--purple),var(--violet));color:var(--white);padding:11px 24px;border-radius:8px;text-decoration:none;font-weight:700;font-size:.85rem;position:relative;transition:all .25s}
.leave-link:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(124,58,237,.4)}

.category-page{padding:40px 24px 80px;max-width:1100px;margin:0 auto}
.cat-header{margin-bottom:36px}
.cat-title{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;color:var(--white);letter-spacing:-.03em;margin-bottom:8px}
.cat-subtitle{font-size:.85rem;color:var(--grey);font-family:'JetBrains Mono',monospace;line-height:1.6;max-width:640px}
.store-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px;margin-bottom:10px}
.store-chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border2);color:var(--accent);padding:6px 14px;border-radius:20px;text-decoration:none;font-size:.72rem;font-family:'JetBrains Mono',monospace;font-weight:500;transition:all .2s;white-space:nowrap}
.store-chip:hover{border-color:var(--purple2);background:rgba(124,58,237,.1);color:var(--white)}
.store-label{font-size:.65rem;color:var(--grey);font-family:'JetBrains Mono',monospace;margin-bottom:6px;text-transform:uppercase;letter-spacing:.1em}

.apps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}
.app-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:12px;transition:all .3s cubic-bezier(.16,1,.3,1);animation:cardIn .4s ease forwards;opacity:0;transform:translateY(16px)}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}
.app-card:hover{border-color:var(--border2);background:var(--surface2);transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.4)}
.app-top{display:flex;align-items:center;gap:12px}
.app-icon{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--surface2),var(--bg3));border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;overflow:hidden}
.app-icon img{width:100%;height:100%;object-fit:cover;border-radius:9px}
.app-name{font-weight:700;font-size:.95rem;color:var(--white);line-height:1.3}
.app-repo{font-size:.65rem;color:var(--grey);font-family:'JetBrains Mono',monospace}
.app-desc{font-size:.8rem;line-height:1.6;color:var(--grey2);font-family:'JetBrains Mono',monospace;font-weight:300}
.app-features{display:flex;flex-direction:column;gap:4px}
.app-feat{font-size:.72rem;color:var(--accent);font-family:'JetBrains Mono',monospace;display:flex;align-items:flex-start;gap:6px}
.app-feat::before{content:'▸';color:var(--purple2);flex-shrink:0;margin-top:1px}
.app-dl{display:inline-flex;align-items:center;gap:6px;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.3);color:var(--accent2);padding:7px 14px;border-radius:7px;text-decoration:none;font-size:.73rem;font-family:'JetBrains Mono',monospace;font-weight:500;transition:all .2s;margin-top:auto;width:fit-content}
.app-dl:hover{background:rgba(124,58,237,.22);border-color:var(--purple2);color:var(--white)}

footer{background:var(--bg2);border-top:1px solid var(--border);padding:36px 24px;text-align:center;position:relative;z-index:1}
.footer-inner{max-width:700px;margin:0 auto}
.footer-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:var(--white);margin-bottom:6px}
.footer-logo span{color:var(--purple3)}
.footer-slogan{font-size:.78rem;color:var(--grey);font-family:'JetBrains Mono',monospace;margin-bottom:20px}
.footer-links{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:16px}
.footer-link{color:var(--grey2);text-decoration:none;font-size:.75rem;font-family:'JetBrains Mono',monospace;transition:color .2s}
.footer-link:hover{color:var(--accent2)}
.footer-copy{font-size:.68rem;color:var(--grey);font-family:'JetBrains Mono',monospace;opacity:.6}

.overlay{display:none;position:fixed;top:60px;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:98}
.overlay.open{display:block}

@media(max-width:768px){
.nav-links{display:none}
.swiss-knife{display:none}
.hamburger{display:block}
.lang-btns{gap:3px}
.lang-btn{padding:3px 7px;font-size:.65rem}
.apps-grid{grid-template-columns:1fr}
.hero-title{font-size:1.9rem}
.threat-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
header{padding:0 12px;gap:10px}
.logo{font-size:1rem}
}

</head>

let lang = 'en';
let currentPage = 'home';

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');
  renderNav();
  renderPage(currentPage);
  document.getElementById('footerSlogan').textContent = T[lang].footerSlogan;
}

function toggleMobileMenu() {
  const m = document.getElementById('mobileMenu');
  const o = document.getElementById('overlay');
  m.classList.toggle('open');
  o.classList.toggle('open');
}

function closeMobileMenu() {
  document.getElementById('mobileMenu').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function navigate(page) {
  currentPage = page;
  window.location.hash = page;
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.page === page);
  });
  renderPage(page);
  closeMobileMenu();
  window.scrollTo(0,0);
}

function renderNav() {
  const navLinks = document.getElementById('navLinks');
  const mobileMenu = document.getElementById('mobileMenu');
  const navHTML = CATS.map(c => `<button class="nav-btn${currentPage===c.id?' active':''}" data-page="${c.id}" onclick="navigate('${c.id}')">${T[lang][c.id]||c.id}</button>`).join('');
  navLinks.innerHTML = navHTML;
  mobileMenu.innerHTML = navHTML;
}

function renderPage(page) {
  const main = document.getElementById('main');
  if (page === 'home') {
    main.innerHTML = renderHome();
  } else {
    const catKey = page+'Apps';
    main.innerHTML = renderCategory(page, catKey);
  }
}

function renderHome() {
  const t = T[lang];
  const tagsHTML = t.heroTags.map(tag => {
    const isBad = tag.includes('📡')||tag.includes('📸')||tag.includes('🎙')||tag.includes('🔑')||tag.includes('💰');
    return `<span class="hero-tag ${isBad?'bad':'good'}">${tag}</span>`;
  }).join('');
  const threatHTML = t.threatCards.map(c => `
    <div class="threat-card ${c.type}">
      <h3>${c.title}</h3>
      <p>${c.text}</p>
    </div>
  `).join('');
  return `
    <div class="page active">
      <div class="hero">
        <div class="hero-eyebrow">${t.heroEyebrow}</div>
        <h1 class="hero-title">${t.heroTitle[0]}<br><em>${t.heroTitleEm}</em></h1>
        <p class="hero-sub">${t.heroSub}</p>
        <div class="hero-tags">${tagsHTML}</div>
        <button class="hero-cta" onclick="navigate('privacy')">${t.heroCta}</button>
      </div>
      <div class="threat-section">
        <div class="threat-grid">${threatHTML}</div>
      </div>
      <div class="leave-banner">
        <div class="leave-card">
          <h2>${t.leaveTitle}</h2>
          <p>${t.leaveSub}</p>
          <a class="leave-link" href="https://leavemyinternet.github.io" target="_blank" rel="noopener">${t.leaveLink}</a>
        </div>
      </div>
    </div>
  `;
}

function renderCategory(page, catKey) {
  const t = T[lang];
  const apps = APPS[page] || [];
  const stores = STORES[lang];
  const storeChips = stores.map(s => `<a class="store-chip" href="${s.url}" target="_blank" rel="noopener">⬇ ${s.label}</a>`).join('');
  const adbNote = page === 'phone' ? `<div style="background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);border-radius:10px;padding:16px 20px;margin-bottom:24px;font-size:.8rem;color:var(--accent2);font-family:'JetBrains Mono',monospace;line-height:1.6">${t.adbNote}</div>` : '';
  const cardsHTML = apps.map((app, i) => {
    const di = app.desc[lang] || app.desc.en;
    const fi = (app.features[lang] || app.features.en);
    const featHTML = fi.map(f => `<div class="app-feat">${f}</div>`).join('');
    const iconHTML = `<div class="app-icon">${app.icon}</div>`;
    return `
      <div class="app-card stagger-${Math.min(i+1,50)}">
        <div class="app-top">
          ${iconHTML}
          <div>
            <div class="app-name">${app.name}</div>
            ${app.repo ? `<div class="app-repo">${app.repo}</div>` : ''}
          </div>
        </div>
        <div class="app-desc">${di}</div>
        <div class="app-features">${featHTML}</div>
        ${app.dl ? `<a class="app-dl" href="${app.dl}" target="_blank" rel="noopener">${t.dlBtn}</a>` : ''}
      </div>
    `;
  }).join('');
  return `
    <div class="page active">
      <div class="category-page">
        <div class="cat-header">
          <div class="cat-title">${t[page]}</div>
          <div class="cat-subtitle">${t.catDescs[page]}</div>
          <div class="store-label">${t.storeLabel}</div>
          <div class="store-row">${storeChips}</div>
        </div>
        ${adbNote}
        <div class="apps-grid">${cardsHTML}</div>
      </div>
    </div>
  `;
}

function init() {
  renderNav();
  document.getElementById('footerSlogan').textContent = T[lang].footerSlogan;
  const hash = window.location.hash.replace('#','');
  const validPages = CATS.map(c=>c.id);
  const startPage = validPages.includes(hash) ? hash : 'home';
  navigate(startPage);
}

window.addEventListener('hashchange', () => {
  const hash = window.location.hash.replace('#','');
  const validPages = CATS.map(c=>c.id);
  if (validPages.includes(hash) && hash !== currentPage) {
    navigate(hash);
  }
});

init();
</script>
